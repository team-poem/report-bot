<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>한글 문서 분석·취합</title>
  <style>
    body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    textarea { width: 100%; height: 5rem; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
    #log { background: #111; color: #9fe; font-family: monospace; font-size: 0.8rem; padding: 0.75rem; height: 9rem; overflow-y: auto; white-space: pre-wrap; border-radius: 6px; margin-top: 1rem; }
    #report { border-top: 2px solid #eee; margin-top: 1.5rem; padding-top: 1rem; }
    #report a { display: inline-block; margin-bottom: 0.5rem; }
    .report-frame { width: 100%; height: 70vh; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
    .status { font-weight: 600; margin-top: 0.5rem; }
    .err { color: #c00; }
    label { display:block; margin-top: 0.75rem; font-weight:600; }
  </style>
</head>
<body>
  <h1>한글 문서 분석·취합</h1>
  <p>한글/엑셀 파일 여러 개를 올리고, 분석 리포트나 취합 문서를 받으세요. 결과는 한글 파일로 내려받을 수 있습니다.</p>

  <form id="form">
    <label>문서 파일 (여러 개 선택 가능)
      <input type="file" id="files" name="files" multiple required />
    </label>
    <label>산출물 종류</label>
    <label style="font-weight:400"><input type="radio" name="output_type" value="report" checked />
      분석 리포트 — 문서들을 분석한 리포트를 받습니다</label>
    <label style="font-weight:400"><input type="radio" name="output_type" value="merge" />
      취합 문서 — 여러 문서의 내용을 하나의 새 문서로 취합합니다</label>
    <label>양식 파일 (선택, .hwpx)
      <input type="file" id="template" accept=".hwpx" />
    </label>
    <small style="display:block;color:#666;margin-top:0.25rem">
      양식 안에 <code>{{본문}}</code>, <code>{{추가: 지시}}</code>,
      <code>{{수정시작: 지시}}</code> ~ <code>{{수정끝}}</code> 자리표시자를
      한 줄에 하나씩 넣어 두면 그 위치에 생성 내용이 채워집니다.
    </small>
    <label>요청 내용
      <textarea id="request_text" placeholder="예: 부서별 보고서를 하나로 취합해줘"></textarea>
    </label>
    <button type="submit">시작</button>
  </form>

  <div class="status" id="status"></div>
  <div id="log" hidden></div>
  <div id="report"></div>

  <script>
    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const reportEl = document.getElementById('report');

    function appendLog(line) {
      logEl.hidden = false;
      logEl.textContent += line + '\n';
      logEl.scrollTop = logEl.scrollHeight;
    }

    // codex exec --json 이벤트를 읽기 좋은 한 줄로 변환. 표시할 게 없으면 null.
    function describeEvent(data) {
      const item = data.item || {};
      if (data.type === 'item.started') {
        if (item.type === 'command_execution') return '$ ' + (item.command || '');
        return null; // agent_message 등은 completed 때 본문을 보여준다
      }
      if (data.type === 'item.completed') {
        if (item.type === 'agent_message' || item.type === 'reasoning') return item.text || '';
        return null; // command_execution 완료는 started 때 이미 표시
      }
      if (data.type === 'turn.completed' && data.usage) {
        return '· 분석 완료 (출력 토큰 ' + data.usage.output_tokens + ')';
      }
      if (data.type === 'raw') return data.text || '';
      if (data.type === 'thread.started' || data.type === 'turn.started') return null;
      return data.text || null;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      reportEl.innerHTML = '';
      logEl.textContent = '';
      statusEl.className = 'status';
      statusEl.textContent = '업로드 중…';

      const fd = new FormData();
      for (const f of document.getElementById('files').files) fd.append('files', f);
      fd.append('request_text', document.getElementById('request_text').value);
      fd.append('output_type', document.querySelector('input[name="output_type"]:checked').value);
      const tpl = document.getElementById('template').files[0];
      if (tpl) fd.append('template', tpl);

      const resp = await fetch('/jobs', { method: 'POST', body: fd });
      if (!resp.ok) {
        let detail = '업로드 실패';
        try { detail = (await resp.json()).detail || detail; } catch {}
        statusEl.textContent = detail;
        statusEl.className = 'status err';
        return;
      }
      const { job_id } = await resp.json();
      statusEl.textContent = '대기 중 — 분석 차례를 기다리는 중…';

      const es = new EventSource(`/jobs/${job_id}/events`);
      es.onmessage = async (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === 'status') {
          statusEl.textContent = '상태: ' + data.state + (data.step ? ' — ' + data.step : '');
          if (data.state === 'failed') {
            statusEl.className = 'status err';
            statusEl.textContent = '실패: ' + (data.error || '알 수 없는 오류');
          }
        } else if (data.type === 'end') {
          es.close();
          await loadReport(job_id);
        } else {
          const line = describeEvent(data);
          if (line) appendLog(line);
        }
      };
      es.onerror = () => { es.close(); };
    });

    async function loadReport(jobId) {
      const statusResp = await fetch(`/jobs/${jobId}`);
      const status = await statusResp.json();
      const isDone = status.state === 'done';
      if (!isDone && status.state !== 'failed') return;

      const url = `/jobs/${jobId}/report`;
      if (!isDone) {
        // 실패한 잡: 리포트가 이미 만들어져 있으면(HWPX 생성 실패 등) 미리보기만 제공
        // FastAPI 버전에 따라 HEAD 가 405 를 반환할 수 있으므로 GET 으로 확인
        const probe = await fetch(url);
        if (!probe.ok) return;
      }
      reportEl.innerHTML = '';
      if (isDone) {
        const hwpx = document.createElement('a');
        hwpx.href = `/jobs/${jobId}/hwpx`;
        hwpx.textContent = '⬇ 한글 파일(.hwpx) 다운로드';
        reportEl.appendChild(hwpx);
        reportEl.appendChild(document.createElement('br'));
      }
      const dl = document.createElement('a');
      dl.href = url;
      dl.textContent = '⬇ report.html 다운로드';
      dl.setAttribute('download', 'report.html');
      reportEl.appendChild(dl);
      const frame = document.createElement('iframe');
      frame.src = url;
      frame.className = 'report-frame';
      reportEl.appendChild(frame);
    }
  </script>
</body>
</html>
